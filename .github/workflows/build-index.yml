name: Build Bazaar Index

on:
  push:
    branches: [main]
  schedule:
    # Every 6 hours — picks up changes in vetted bazaars
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build index
        run: python scripts/build-index.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show index summary
        run: |
          echo "=== Index summary ==="
          python -c "
          import json
          idx = json.load(open('index.json'))
          print(f'Generated: {idx[\"generated_at\"]}')
          print(f'Providers: {idx[\"provider_count\"]}')
          for p in idx['providers'][:10]:
              print(f'  {p[\"fqn\"]:30s} {p[\"endpoint_count\"]:3d} endpoints  {p[\"category\"]}')
          if idx['provider_count'] > 10:
              print(f'  ... and {idx[\"provider_count\"] - 10} more')
          "

      - name: Upload index as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-index
          path: index.json

